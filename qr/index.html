<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maelstrom | QR Routes</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="tasting.css" />
  </head>
  <body class="tasting-body">
    <main class="tasting-shell">
      <section class="tasting-hero compact">
        <img class="tasting-map" src="../assets/maelstrom-pirate-map.png" alt="" draggable="false" />
        <div class="tasting-hero-content">
          <p class="site-kicker">Crew QR route</p>
          <h1>Tasting QR</h1>
          <p>This page is not linked from the public website. Use it to print or test the hidden tasting route.</p>
        </div>
      </section>

      <section class="tasting-board">
        <div class="qr-panel">
          <img
            class="qr-code"
            src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&margin=18&data=https%3A%2F%2Fpiratebergen.github.io%2FMaelstrom%2Fqr%2Ftasting.html"
            alt="QR code for the Maelstrom tasting tier list"
          />
          <div>
            <p class="site-kicker">Tasting page</p>
            <h2>Signature shooter tier list</h2>
            <p>
              QR target:
              <a href="https://piratebergen.github.io/Maelstrom/qr/tasting.html">
                https://piratebergen.github.io/Maelstrom/qr/tasting.html
              </a>
            </p>
            <div class="hero-actions left">
              <a class="primary-link" href="tasting.html">Open tasting page</a>
              <a class="ghost-link" href="results.html">Open results page</a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
