<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Maelstrom in Bergen. Enter the map and discover the countdown before opening night."
    />
    <title>Maelstrom | Bergen</title>
    <link rel="preload" href="assets/maelstrom-pirate-map.webp" as="image" />
    <link rel="preload" href="assets/maelstrom-harvibore-cover.jpg" as="image" />
    <link rel="preload" href="assets/rope-separator.webp" as="image" />
    <link rel="preload" href="assets/parchment-background.jpg" as="image" />
    <link rel="preload" href="assets/treasure-chest.webp" as="image" />
    <link rel="preload" href="assets/treasure-chest-open.webp" as="image" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="gate" aria-label="Maelstrom site entrance">
      <div class="sea-haze" aria-hidden="true"></div>

      <section class="map-stage" aria-live="polite">
        <div class="map-orbit" aria-hidden="true">
          <img
            class="map-image"
            src="assets/maelstrom-pirate-map.webp"
            alt=""
            draggable="false"
          />
        </div>
        <div class="abyss-wash" aria-hidden="true"></div>

        <button class="map-disc-button" type="button" aria-expanded="false" aria-label="Turn the map upside down">
          <svg class="disc-lettering" viewBox="0 0 300 300" aria-hidden="true">
            <defs>
              <path id="lettering-top-path" d="M 44 150 A 106 106 0 0 1 256 150" />
              <path id="lettering-bottom-path" d="M 256 150 A 106 106 0 0 1 44 150" />
            </defs>
            <text class="lettering-top">
              <textPath href="#lettering-top-path" startOffset="50%" text-anchor="middle">UP IS DOWN</textPath>
            </text>
            <text class="lettering-bottom">
              <textPath href="#lettering-bottom-path" startOffset="50%" text-anchor="middle">UP IS DOWN</textPath>
            </text>
          </svg>
          <span class="disc-flip">
            <span class="disc-map"></span>
            <span class="ship-scene" aria-hidden="true">
              <img class="pirate-ship" src="assets/ship.webp" alt="" draggable="false" />
            </span>
          </span>
        </button>

        <div class="countdown" aria-hidden="true">
          <p class="kicker">Opening in Bergen</p>
          <h1>MAELSTROM</h1>
          <p class="date">September 15, 2026</p>
          <div class="time-grid" role="timer" aria-label="Countdown before opening night">
            <span>
              <strong data-unit="days">000</strong>
              <small>days</small>
            </span>
            <span>
              <strong data-unit="hours">00</strong>
              <small>hours</small>
            </span>
            <span>
              <strong data-unit="minutes">00</strong>
              <small>minutes</small>
            </span>
            <span>
              <strong data-unit="seconds">00</strong>
              <small>seconds</small>
            </span>
          </div>
          <a class="admin-preview-link" href="?preview=site">Admin preview</a>
        </div>
      </section>
    </main>

    <main class="full-site" id="site" aria-label="Maelstrom website" hidden>
      <header class="site-header">
        <a class="brand-mark" href="#top" aria-label="Maelstrom home">
          <span class="brand-symbol">M</span>
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="#concept">Concept</a>
          <a href="qr/results.html">Tier results</a>
          <a href="#contact">Contact</a>
        </nav>
      </header>

      <section class="site-hero" id="top">
        <img class="site-map" src="assets/maelstrom-harvibore-cover.jpg" alt="" draggable="false" />
        <div class="site-hero-content">
          <img class="site-logo-title" src="assets/maelstrom-logo.webp" alt="Maelstrom" draggable="false" />
          <div class="hero-actions">
            <a class="treasure-button" href="qr/results.html">
              <span>Tier results</span>
            </a>
            <a class="treasure-button" href="#contact">
              <span>Contact</span>
            </a>
          </div>
        </div>
        <p class="cover-credit">@harvibore</p>
      </section>

      <div class="rope-separator" aria-hidden="true"></div>

      <section class="content-band intro-band" id="concept">
        <div class="section-heading">
          <h2>You best start believing in ghost stories mate... you're in one!</h2>
        </div>
        <div class="photo-carousel" aria-label="Maelstrom atmosphere photo carousel">
          <button class="carousel-cue carousel-cue-left" type="button" aria-label="Previous photos"></button>
          <button class="carousel-cue carousel-cue-right" type="button" aria-label="Next photos"></button>
          <div class="photo-track">
            <figure class="photo-placeholder frame-green tilt-left">
              <span>Photo 01</span>
            </figure>
            <figure class="photo-placeholder frame-gold tall lift-small">
              <span>Photo 02</span>
            </figure>
            <figure class="photo-placeholder frame-dark-wood tilt-right">
              <span>Photo 03</span>
            </figure>
            <figure class="photo-placeholder frame-red compact lift-large">
              <span>Photo 04</span>
            </figure>
            <figure class="photo-placeholder frame-dark-gold-landscape landscape tilt-left">
              <span>Photo 05</span>
            </figure>
            <figure class="photo-placeholder frame-dark-gold lift-small">
              <span>Photo 06</span>
            </figure>
            <figure class="photo-placeholder frame-dark-wood-landscape landscape tilt-right">
              <span>Photo 07</span>
            </figure>
            <figure class="photo-placeholder frame-green tilt-left" aria-hidden="true">
              <span>Photo 01</span>
            </figure>
            <figure class="photo-placeholder frame-gold tall lift-small" aria-hidden="true">
              <span>Photo 02</span>
            </figure>
            <figure class="photo-placeholder frame-dark-wood tilt-right" aria-hidden="true">
              <span>Photo 03</span>
            </figure>
            <figure class="photo-placeholder frame-red compact lift-large" aria-hidden="true">
              <span>Photo 04</span>
            </figure>
            <figure class="photo-placeholder frame-dark-gold-landscape landscape tilt-left" aria-hidden="true">
              <span>Photo 05</span>
            </figure>
            <figure class="photo-placeholder frame-dark-gold lift-small" aria-hidden="true">
              <span>Photo 06</span>
            </figure>
            <figure class="photo-placeholder frame-dark-wood-landscape landscape tilt-right" aria-hidden="true">
              <span>Photo 07</span>
            </figure>
          </div>
        </div>
      </section>

      <div class="rope-separator" aria-hidden="true"></div>

      <section class="content-band contact-band" id="contact">
        <div class="social-links" aria-label="Social links">
          <a class="social-icon social-instagram" href="#" aria-label="Instagram link coming soon">
            <img src="assets/social-instagram.webp" alt="" draggable="false" />
          </a>
          <a class="social-icon social-tiktok" href="#" aria-label="TikTok link coming soon">
            <img src="assets/social-tiktok.webp" alt="" draggable="false" />
          </a>
          <a class="social-icon social-youtube" href="#" aria-label="YouTube link coming soon">
            <img src="assets/social-youtube.webp" alt="" draggable="false" />
          </a>
          <a class="social-icon social-facebook" href="#" aria-label="Facebook link coming soon">
            <img src="assets/social-facebook.webp" alt="" draggable="false" />
          </a>
        </div>
      </section>

      <div class="photo-lightbox" role="dialog" aria-modal="true" aria-label="Expanded photo" hidden>
        <button class="lightbox-close" type="button" aria-label="Close photo"></button>
        <div class="lightbox-stage">
          <figure class="photo-placeholder lightbox-frame">
            <span>Photo</span>
          </figure>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
